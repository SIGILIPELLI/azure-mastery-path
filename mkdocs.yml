site_name: Azure Mastery Path
site_description: A structured, module-wise Microsoft Azure training program from entry level to master level, focused on hands-on cloud infrastructure and services.
site_url: https://sigilipelli.github.io/azure-mastery-path/
repo_url: https://github.com/SIGILIPELLI/azure-mastery-path
repo_name: azure-mastery-path

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Privacy Policy: privacy.md
  - "Level 1 · Entry":
      - Overview: level-1/index.md
      - "01 · Setup & Azure CLI/Portal": level-1/01-setup-cli-portal.md
      - "02 · Azure AD & RBAC / Security Basics": level-1/02-azure-ad-rbac-security.md
      - "03 · Virtual Machines": level-1/03-virtual-machines.md
      - "04 · Blob Storage": level-1/04-blob-storage.md
      - "05 · Virtual Networks Basics": level-1/05-virtual-networks.md
      - "06 · Azure SQL Database / Cosmos DB Basics": level-1/06-azure-sql-cosmos-db.md
      - "07 · Azure Functions": level-1/07-azure-functions.md
      - "08 · Azure Monitor & Log Analytics": level-1/08-azure-monitor-log-analytics.md
      - "09 · ARM Templates / Bicep Intro": level-1/09-arm-bicep-intro.md
      - "10 · Capstone Project": level-1/10-capstone-project.md
  - "Level 2 · Intermediate":
